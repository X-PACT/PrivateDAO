<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">PrivateDAO sovereign infrastructure map</title>
  <desc id="desc">PrivateDAO system map showing Solana governance, QVAC local intelligence, private settlement, proof, read node, Supabase receipts, and cross-chain roadmap.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.46" stop-color="#061826"/>
      <stop offset="1" stop-color="#150a2b"/>
    </linearGradient>
    <linearGradient id="solana" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#14f195"/>
      <stop offset="0.5" stop-color="#00c2ff"/>
      <stop offset="1" stop-color="#9945ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label{font-family:Inter,Arial,sans-serif;fill:#f8fafc}
      .muted{font-family:Inter,Arial,sans-serif;fill:#a8b3c7}
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#c4f1ff}
      .card{fill:rgba(15,23,42,.72);stroke:rgba(148,163,184,.28);stroke-width:1.4}
      .cyan{stroke:#22d3ee}
      .green{stroke:#14f195}
      .violet{stroke:#a855f7}
      .amber{stroke:#f59e0b}
    </style>
  </defs>
  <rect width="1280" height="720" rx="36" fill="url(#bg)"/>
  <circle cx="112" cy="92" r="160" fill="#14f195" opacity=".10"/>
  <circle cx="1130" cy="92" r="190" fill="#9945ff" opacity=".12"/>
  <circle cx="1010" cy="620" r="210" fill="#00c2ff" opacity=".08"/>
  <g transform="translate(64 54)">
    <text class="label" x="0" y="0" font-size="24" font-weight="800">PrivateD</text>
    <text x="92" y="1" font-family="Inter,Arial,sans-serif" font-size="28" font-weight="900" fill="url(#solana)">△</text>
    <text class="label" x="118" y="0" font-size="24" font-weight="800">O</text>
    <text class="muted" x="0" y="36" font-size="14" letter-spacing="2">SOVEREIGN PRIVACY INFRASTRUCTURE FOR SOLANA GOVERNANCE</text>
  </g>
  <g transform="translate(64 126)">
    <text class="label" x="0" y="0" font-size="48" font-weight="800">Private. Verified. Informed.</text>
    <text class="muted" x="0" y="36" font-size="18">Wallet-first encrypted governance, private settlement, local QVAC intelligence, proof continuity, and Mainnet review path.</text>
  </g>
  <g transform="translate(452 216)" filter="url(#glow)">
    <circle cx="190" cy="126" r="108" fill="rgba(20,241,149,.10)" stroke="url(#solana)" stroke-width="3"/>
    <path d="M143 118h94l-47-78z" fill="none" stroke="url(#solana)" stroke-width="8" stroke-linejoin="round"/>
    <text class="label" x="190" y="137" font-size="28" font-weight="800" text-anchor="middle">Solana</text>
    <text class="muted" x="190" y="164" font-size="13" text-anchor="middle">guardian chain · proof home</text>
  </g>
  <g transform="translate(64 242)">
    <rect class="card green" x="0" y="0" width="286" height="104" rx="20"/>
    <text class="label" x="22" y="34" font-size="18" font-weight="700">Anchor 1.0.1 Governance</text>
    <text class="muted" x="22" y="62" font-size="13">DAO creation · proposals · commit/reveal</text>
    <text class="mono" x="22" y="84" font-size="11">EP9xE8MJ...Jzsecuva</text>
  </g>
  <g transform="translate(64 382)">
    <rect class="card cyan" x="0" y="0" width="286" height="104" rx="20"/>
    <text class="label" x="22" y="34" font-size="18" font-weight="700">QVAC Local Intelligence</text>
    <text class="muted" x="22" y="62" font-size="13">on-device brief · translate · OCR · speech</text>
    <text class="mono" x="22" y="84" font-size="11">@qvac/sdk 0.10.0 · fabric-llm</text>
  </g>
  <g transform="translate(64 522)">
