    <text class="label" x="22" y="34" font-size="18" font-weight="700">Private Settlement Rails</text>
    <text class="muted" x="22" y="62" font-size="13">Cloak · Umbra · payroll · treasury</text>
    <text class="mono" x="22" y="84" font-size="11">intent → receipt → proof</text>
  </g>
  <g transform="translate(930 242)">
    <rect class="card amber" x="0" y="0" width="286" height="104" rx="20"/>
    <text class="label" x="22" y="34" font-size="18" font-weight="700">Runtime Proof</text>
    <text class="muted" x="22" y="62" font-size="13">read-node · AWS · API health · receipts</text>
    <text class="mono" x="22" y="84" font-size="11">api.privatedao.org</text>
  </g>
  <g transform="translate(930 382)">
    <rect class="card cyan" x="0" y="0" width="286" height="104" rx="20"/>
    <text class="label" x="22" y="34" font-size="18" font-weight="700">Evidence Timeline</text>
    <text class="muted" x="22" y="62" font-size="13">Supabase · visitors · operation receipts</text>
    <text class="mono" x="22" y="84" font-size="11">freshness · chain watcher</text>
  </g>
  <g transform="translate(930 522)">
    <rect class="card green" x="0" y="0" width="286" height="104" rx="20"/>
    <text class="label" x="22" y="34" font-size="18" font-weight="700">Phase 2 → Phase 3</text>
    <text class="muted" x="22" y="62" font-size="13">encrypted customer lanes · Mainnet review</text>
    <text class="mono" x="22" y="84" font-size="11">cross-chain · Solana anchored</text>
  </g>
  <g stroke="url(#solana)" stroke-width="2.4" opacity=".72" fill="none">
    <path d="M350 294 C420 280 455 284 518 314"/>
    <path d="M350 434 C420 410 465 390 538 354"/>
    <path d="M350 574 C432 520 480 462 552 392"/>
    <path d="M832 314 C874 292 894 288 930 294"/>
    <path d="M832 354 C876 382 894 408 930 434"/>
    <path d="M804 410 C872 492 892 542 930 574"/>
  </g>
  <g transform="translate(450 612)">
    <rect x="0" y="0" width="380" height="48" rx="24" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.16)"/>
    <text class="muted" x="190" y="30" text-anchor="middle" font-size="14">Founder Whiteprint · open-source core · official use coordinated</text>
  </g>
</svg>
